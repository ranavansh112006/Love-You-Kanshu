<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  text-align: center;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  color: #fff;
}

.container {
  padding: 50px;
}

h1 {
  font-size: 40px;
}

p {
  font-size: 20px;
}

img {
  width: 200px;
  border-radius: 15px;
  margin: 10px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#yesBtn {
  background-color: #28a745;
  color: white;
}

#noBtn {
  background-color: #dc3545;
  color: white;
  position: absolute;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<div class="container">

  <h1>Hey ❤️      [Kanishka]</h1>





  <p>I have something special to tell you...</p>
  <p>You make my life beautiful 💖</p>

  <!-- Add your images here -->
  <img src="photo2.jpg" alt="Memory 1">
 

  <h2>Will you be mine forever? 💍</h2>

  <button id="yesBtn" onclick="yesClick()">Yes 😍</button>
  <button id="noBtn" onmouseover="moveButton()">No 😢</button>

  <h2 id="result" class="hidden">Yay! I Love You So Much ❤️🥰</h2>

</div>

<script>
function yesClick() {
  document.getElementById("result").classList.remove("hidden");
}

function moveButton() {
  var button = document.getElementById("noBtn");
  var x = Math.random() * window.innerWidth - 100;
  var y = Math.random() * window.innerHeight - 50;

  button.style.left = x + "px";
  button.style.top = y + "px";
}
</script>

</body>
</html>
